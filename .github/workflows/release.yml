name: Release

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: 'Commit build changes to repository'
        type: boolean
        default: true
      update_homebrew:
        description: 'Update Homebrew tap'
        type: boolean
        default: true

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print Environment Info
        run: |
          echo "macOS Version: $(sw_vers -productVersion)"
          echo "Xcode Version: $(xcodebuild -version | head -1)"
          echo "Xcode Path: $(xcode-select -p)"

      - name: Bump Build Number
        run: bash Scripts/bump-version.sh

      - name: Get Version
        id: version
        run: |
          VERSION=$(xcodebuild -project Americano.xcodeproj -showBuildSettings -scheme Americano 2>/dev/null | grep MARKETING_VERSION | head -1 | awk '{print $3}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: bash Scripts/changelog.sh

      - name: Build
        run: bash Scripts/ci-build.sh

      - name: Import Sparkle Signing Key
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [[ -z "$SPARKLE_PRIVATE_KEY" ]]; then
            echo "Error: SPARKLE_PRIVATE_KEY secret is not set"
            exit 1
          fi
          printf "%s" "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_ed25519.key

      - name: Generate Appcast
        env:
          SPARKLE_PRIVATE_KEY_FILE: /tmp/sparkle_ed25519.key
        run: bash Scripts/gen-appcast.sh

      - name: Commit & Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ "${{ inputs.commit_changes }}" = "true" ]; then
            git add -A
            git commit -m "[RELEASE] v${{ steps.version.outputs.version }}" || echo "No changes to commit"
          fi
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin HEAD --tags

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Americano v${{ steps.version.outputs.version }}
          body_path: Releases/CHANGELOG.md
          files: |
            Releases/Americano.app.zip
            appcast.xml

      - name: Update Homebrew Tap
        if: ${{ inputs.update_homebrew }}
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/LZhenHong/homebrew-tap.git ../homebrew-tap
          bash Scripts/homebrew.sh ../homebrew-tap
          cd ../homebrew-tap && git push
